- name: Fish Shell
  block:
    - name: Fish - Create directories
      ansible.builtin.file:
        path: "{{ fish_config_dir }}/{{ item.path }}"
        state: directory
      loop: "{{ lookup('community.general.filetree', 'configs/files/fish/', wantlist=True) | selectattr('state', '==', 'directory') }}"

    - name: Fish - Write configs
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ fish_config_dir }}/{{ item.path }}"
      loop: "{{ lookup('community.general.filetree', 'configs/files/fish/', wantlist=True) | selectattr('state', '==', 'file') }}"
  tags:
    - fish

- name: Neovim
